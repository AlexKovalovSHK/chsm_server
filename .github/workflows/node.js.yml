name: Bun CI/CD with Docker Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: "chsm_serv"
  DEPLOY_DIR: "/root/chsm_serv"
  CONTAINER_NAME: "chsm_serv"
  HOST_PORT: "5008"
  CONTAINER_PORT: "5001" 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Шаг 3: Установка зависимостей (использует ваш bun.lock)
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Шаг 4: Сборка проекта
      - name: Build project
        run: bun run build

      # Шаг 5: Сборка Docker-образа
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .

      # Шаг 6: Сохранение образа
      - name: Save Docker image
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:latest -o ${{ env.DOCKER_IMAGE }}.tar

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      # Шаг 7: Подготовка папки и копирование файлов
      - name: Copy files to remote server
        run: |
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p ${{ env.DEPLOY_DIR }}"
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" scp -o StrictHostKeyChecking=no ${{ env.DOCKER_IMAGE }}.tar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ env.DEPLOY_DIR }}/
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ env.DEPLOY_DIR }}/

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy Docker image on remote server
        run: |
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            cd ${{ env.DEPLOY_DIR }} &&
            
            # 1. Загружаем новый образ
            docker load -i ${{ env.DOCKER_IMAGE }}.tar &&
            
            # 2. Создаем файл .env из секретов GitHub (решает проблему с токеном)
            echo 'TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}' > .env &&
            # Если есть база данных, добавьте её сюда:
            # echo 'MONGO_URI=${{ secrets.MONGO_URI }}' >> .env &&

            # 3. Принудительно удаляем старый контейнер, если он конфликтует (решает Conflict)
            docker rm -f ${{ env.CONTAINER_NAME }} || true
            
            # 4. Останавливаем проект и удаляем сирот (orphans)
            docker-compose down --remove-orphans || true
            
            # 5. Запуск новой версии
            docker-compose up -d &&
            
            # 6. Финальная очистка
            rm ${{ env.DOCKER_IMAGE }}.tar &&
            docker image prune -f
          "