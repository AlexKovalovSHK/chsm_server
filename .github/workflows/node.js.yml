name: Node.js CI with Docker Build and Deploy

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  DOCKER_IMAGE: 'chsm_serv'
  DEPLOY_DIR: '/root/chsm_serv/'
  CONTAINER_NAME: 'chsm_serv'
  HOST_PORT: '5008'
  CONTAINER_PORT: '5008'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Получение кода из репозитория
      - uses: actions/checkout@v4

      # Шаг 2: Установка Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Шаг 3: Установка зависимостей
      # Это нужно для корректной работы Prisma и проверки зависимостей перед сборкой образа
      - run: bun install --frozen-lockfile

      # --- ШАГ 4 УДАЛЕН (nest build больше не нужен, так как Bun запускает src/main.ts напрямую) ---

      # Шаг 4: Установка Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Шаг 5: Сборка Docker-образа
      # Теперь вся магия происходит здесь внутри Dockerfile
      - name: Build Docker image
        run: |
          docker build -t $DOCKER_IMAGE:latest .

      # Шаг 6: Сохранение Docker-образа в tar-файл
      - name: Save Docker image
        run: |
          docker save $DOCKER_IMAGE:latest -o $DOCKER_IMAGE.tar

      # Шаг 7: Установка sshpass
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      # Шаг 8: Копирование файлов на удаленный сервер
      - name: Copy files to remote server
        run: |
          # Создаем директорию перед копированием
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p $DEPLOY_DIR"
          # Копируем образ и docker-compose
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" scp -o StrictHostKeyChecking=no $DOCKER_IMAGE.tar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_DIR
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_DIR

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      # Шаг 1: Подготовка папок и деплой
      - name: Prepare environment and deploy
        run: |
          sshpass -p "${{ secrets.SUDO_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            cd $DEPLOY_DIR &&
            
            # Создаем папку data для БД и папку для бэкапов, чтобы они были постоянными (Persistent)
            mkdir -p data backups_history &&
            chmod 777 data backups_history &&
            
            # Загружаем образ из архива
            docker load -i $DOCKER_IMAGE.tar &&
            
            # Перезапускаем контейнер
            docker-compose down && 
            docker-compose up -d &&
            
            # Удаляем временный tar файл после загрузки, чтобы не занимать место
            rm $DOCKER_IMAGE.tar &&
            
            # Очистка старых неиспользуемых образов
            docker image prune -f
          "